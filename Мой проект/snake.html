<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка - Мультиплеер Арена</title>
    <link rel="stylesheet" href="css/game.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/favicon.jpg" type="image/jpeg">
    <link rel="shortcut icon" href="img/favicon.jpg" type="image/jpeg">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* Убираем обычный курсор, так как играем мышкой */
        #gameCanvas {
            cursor: crosshair;
        }

        #leaderboard {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 17, 34, 0.8);
            border: 2px solid #0ff;
            border-radius: 10px;
            padding: 15px;
            color: #0ff;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            z-index: 100;
            width: 200px;
        }

        #leaderboard h3 {
            margin: 0 0 10px 0;
            text-align: center;
            font-size: 16px;
            border-bottom: 1px solid #0ff;
            padding-bottom: 5px;
        }

        .lb-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }

        #controls-hint {
            display: none;
            /* Уберем подсказку, если она мешает */
        }
    </style>
</head>

<body>

    <div id="gameContainer">
        <!-- Канвас будет большим, камера будет следовать за игроком -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="score">СЧЁТ: <span id="currentScore">0</span></div>

        <div id="leaderboard">
            <h3>ТОП АРЕНЫ</h3>
            <div id="lb-content">Загрузка...</div>
        </div>

        <!-- Кнопка В МЕНЮ (чтобы выйти в любой момент) -->
        <button id="menuBtnDirect"
            style="position: absolute; top: 80px; left: 20px; z-index: 100; padding: 10px 20px; background: rgba(0,0,0,0.5); border: 2px solid #ef4444; color: #ef4444; font-family: 'Orbitron', sans-serif; cursor: pointer; border-radius: 8px;">В
            МЕНЮ (ESC)</button>

        <div id="gameOver" style="display: none;">
            <h1>ВЫ СЪЕДЕНЫ!</h1>
            <p>Итоговый счёт: <span id="finalScore">0</span></p>
            <button id="restartBtn">МАХАЧ ЗАНОВО</button>
            <button id="menuBtn">В МЕНЮ (ESC)</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD8j7J7uxg9SyTrbfGoLBuszJalrbRHJ0w",
            authDomain: "neon-games-2025.firebaseapp.com",
            projectId: "neon-games-2025",
            storageBucket: "neon-games-2025.firebasestorage.app",
            messagingSenderId: "509863622306",
            appId: "1:509863622306:web:e53fa3685235eefcba89fb"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <script>
        // Адаптивное масштабирование
        function applyGameScale() {
            const baseWidth = 1920;
            const baseHeight = 1080;

            const scaleX = window.innerWidth / baseWidth;
            const scaleY = window.innerHeight / baseHeight;
            let scale = Math.min(scaleX, scaleY);
            if (scale < 0.65) scale = 0.65;

            document.body.style.transform = `scale(${scale})`;
            document.body.style.transformOrigin = 'top left';
            document.body.style.width = `${baseWidth}px`;
            document.body.style.height = `${baseHeight}px`;

            const offsetX = (window.innerWidth - baseWidth * scale) / 2;
            const offsetY = (window.innerHeight - baseHeight * scale) / 2;
            document.body.style.position = 'absolute';
            document.body.style.left = `${offsetX}px`;
            document.body.style.top = `${offsetY}px`;
        }

        window.addEventListener('load', applyGameScale);
        window.addEventListener('resize', applyGameScale);

        document.getElementById('menuBtnDirect').addEventListener('click', () => {
            window.location.href = 'index.html?fromGame=true';
        });
    </script>

    <script defer src="js/snake.js"></script>
</body>

</html>
