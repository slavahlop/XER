<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris - NEXT PEAK</title>
    <link rel="stylesheet" href="css/game.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/favicon.jpg" type="image/jpeg">
    <link rel="shortcut icon" href="img/favicon.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="img/favicon.jpg">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>

<body>

    <div id="gameContainer">
        <!-- Канвас 300x600 по центру -->
        <canvas id="gameCanvas" width="300" height="600"></canvas>

        <!-- Стандартные элементы интерфейса (позиционируются через game.css) -->
        <div id="score">СЧЁТ: <span id="currentScore">0</span></div>
        <div id="bestScoreLabel" style="display: block !important;">РЕКОРД: <span id="bestScore">0</span></div>

        <!-- Специфичный для тетриса элемент: Следующая фигура -->
        <div id="nextPieceContainer">
            <div class="label">СЛЕДУЮЩАЯ</div>
            <canvas id="nextPieceCanvas" width="100" height="100"></canvas>
        </div>

        <div id="gameOver">
            <h1>GAME OVER</h1>
            <p>Счёт: <span id="finalScore">0</span></p>
            <button id="restartBtn">ЗАНОВО (Пробел)</button>
            <button id="menuBtn">В МЕНЮ (ESC)</button>
        </div>
    </div>

    <!-- Подсказка управления -->
    <div id="controls-hint">
        <div class="ctrl-title">УПРАВЛЕНИЕ</div>
        <div class="ctrl-row"><span class="key">← →</span> ДВИЖЕНИЕ</div>
        <div class="ctrl-row"><span class="key">↑</span> ПОВОРОТ</div>
        <div class="ctrl-row"><span class="key">↓</span> УСКОРЕНИЕ</div>
        <div class="ctrl-row"><span class="key">ESC</span> В МЕНЮ</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD8j7J7uxg9SyTrbfGoLBuszJalrbRHJ0w",
            authDomain: "neon-games-2025.firebaseapp.com",
            projectId: "neon-games-2025",
            storageBucket: "neon-games-2025.firebasestorage.app",
            messagingSenderId: "509863622306",
            appId: "1:509863622306:web:e53fa3685235eefcba89fb"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <script>
        // Адаптивное масштабирование (копия из других игр)
        function applyGameScale() {
            const baseWidth = 1920;
            const baseHeight = 1080;

            const scaleX = window.innerWidth / baseWidth;
            const scaleY = window.innerHeight / baseHeight;
            let scale = Math.min(scaleX, scaleY);

            if (scale < 0.65) scale = 0.65;

            document.body.style.transform = `scale(${scale})`;
            document.body.style.transformOrigin = 'top left';
            document.body.style.width = `${baseWidth}px`;
            document.body.style.height = `${baseHeight}px`;

            const offsetX = (window.innerWidth - baseWidth * scale) / 2;
            const offsetY = (window.innerHeight - baseHeight * scale) / 2;
            document.body.style.position = 'absolute';
            document.body.style.left = `${offsetX}px`;
            document.body.style.top = `${offsetY}px`;
        }

        window.addEventListener('load', applyGameScale);
        window.addEventListener('resize', applyGameScale);
    </script>

    <script defer src="js/tetris.js"></script>

    <style>
        /* Стилизация под общий дизайн, но с центрированием игрового поля */
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border-left: 2px solid #0ff;
            border-right: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        /* Блок следующей фигуры справа */
        #nextPieceContainer {
            position: absolute;
            top: 100px;
            right: 50px;
            text-align: center;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }

        #nextPieceContainer .label {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        #nextPieceCanvas {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
    </style>

</body>

</html>
